version: '3'

# Recommended workflow (cert-manager tracks the k8s version — see upgrade:cert-manager):
#   task up                                  # create cluster, mirror prod state
#   task upgrade:suc                         # pre-work: upgrade SUC
#   task upgrade:cert-manager:reinstall -- v1.11.5   # pre-work: cert-manager off v1.0.3 (k8s 1.21 ceiling)
#   task k3s:upgrade -- v1.25.16+k3s4       # hop 1
#   task k3s:upgrade:watch                   # watch progress (Ctrl-C when done)
#   task k3s:health                          # verify before continuing
#   task upgrade:cert-manager -- v1.17.4     # now on k8s 1.25: bump cert-manager
#   task k3s:upgrade -- v1.29.14+k3s1       # hop 2
#   task k3s:upgrade:watch
#   task k3s:health
#   task k3s:upgrade -- v1.36.1+k3s1        # final hop
#   task k3s:upgrade:watch
#   task k3s:health
#   task upgrade:cert-manager -- v1.18.2     # now on k8s 1.36: cert-manager -> latest
#   task down                                # clean up

vars:
  TEMP_DIR: /tmp
  K3S_BASELINE: v1.21.6+k3s1      # Starting version — matches production
  UPGRADE_STOP1: v1.25.16+k3s4    # First stop: crosses v1.22/v1.24 breaking changes
  UPGRADE_STOP2: v1.29.14+k3s1    # Second stop: crosses v1.25–v1.28 breaking changes
  UPGRADE_FINAL: v1.36.1+k3s1     # Target: current latest stable

tasks:

  # ── Cluster lifecycle ─────────────────────────────────────────────────────────

  up:
    desc: "Full setup: create VMs, fetch kubeconfig, install old cert-manager and SUC to mirror production"
    cmds:
      - task: vms:create
      - task: k3s:kubeconfig
      - task: mirror:all

  down:
    desc: "Tear down all VMs (data will be lost)"
    cmds:
      - task: vms:delete

  # ── VM management ─────────────────────────────────────────────────────────────

  vms:create:
    desc: "Create OrbStack VMs (skips existing): 3 control-plane nodes + 1 worker, K3s v1.21.6+k3s1"
    cmds:
      - |
        [ -f .cluster-token ] || openssl rand -hex 32 > .cluster-token
        export K3S_TOKEN=$(cat .cluster-token)

        # First control-plane: initialises the embedded etcd cluster (--cluster-init)
        if ! orb list | awk '{print $1}' | grep -q '^qb1$'; then
          envsubst '$K3S_TOKEN' < cloud-init/control-plane-init.yaml \
            > {{.TEMP_DIR}}/cloud-init-qb1.yaml
          orb create ubuntu qb1 --user-data "{{.TEMP_DIR}}/cloud-init-qb1.yaml"
        fi

        echo "Waiting for k3s to be active on qb1..."
        until orb run -m qb1 systemctl is-active k3s 2>/dev/null | grep -q "^active"; do
          sleep 3
        done

        export CP_IP=$(orb list | awk '/^qb1/{print $NF}')
        echo "Control plane IP: ${CP_IP}"

        # Additional control-plane nodes: join the existing etcd cluster
        for CP in qb2 qb3; do
          if ! orb list | awk '{print $1}' | grep -q "^${CP}$"; then
            envsubst '$K3S_TOKEN $CP_IP' < cloud-init/control-plane-join.yaml \
              > {{.TEMP_DIR}}/cloud-init-${CP}.yaml
            orb create ubuntu "$CP" --user-data "{{.TEMP_DIR}}/cloud-init-${CP}.yaml"
          fi
        done

        # Worker node
        if ! orb list | awk '{print $1}' | grep -q '^qb4$'; then
          envsubst '$K3S_TOKEN $CP_IP' < cloud-init/worker.yaml \
            > {{.TEMP_DIR}}/cloud-init-qb4.yaml
          orb create ubuntu qb4 --user-data "{{.TEMP_DIR}}/cloud-init-qb4.yaml"
        fi

  vms:delete:
    desc: Delete all OrbStack VMs
    cmds:
      - orb delete -f qb1 || true
      - orb delete -f qb2 || true
      - orb delete -f qb3 || true
      - orb delete -f qb4 || true

  # ── Kubeconfig ────────────────────────────────────────────────────────────────

  k3s:kubeconfig:
    desc: Fetch kubeconfig from control plane, write kubeconfig-orbstack.yaml
    cmds:
      - >
        orb run -m qb1 -u root cat /etc/rancher/k3s/k3s.yaml
        | sed 's|server: https://127.0.0.1:6443|server: https://qb1.orb.local:6443|'
        > kubeconfig-orbstack.yaml
    generates:
      - kubeconfig-orbstack.yaml

  # ── Status and health ─────────────────────────────────────────────────────────

  k3s:status:
    desc: Show current node versions and upgrade plan/job status
    env:
      KUBECONFIG: "{{.TASKFILE_DIR}}/kubeconfig-orbstack.yaml"
    cmds:
      - |
        echo "=== Nodes ==="
        kubectl get nodes -o wide
        echo ""
        echo "=== Upgrade Plans ==="
        kubectl get plans -n system-upgrade -o wide 2>/dev/null || echo "(no plans or system-upgrade namespace not found)"
        echo ""
        echo "=== Upgrade Jobs ==="
        kubectl get jobs -n system-upgrade 2>/dev/null || true

  k3s:health:
    desc: Post-upgrade health check — node versions, unhealthy pods, cert-manager certificate status
    env:
      KUBECONFIG: "{{.TASKFILE_DIR}}/kubeconfig-orbstack.yaml"
    cmds:
      - |
        echo "=== Node Versions ==="
        kubectl get nodes -o wide
        echo ""
        echo "=== Unhealthy Pods (excluding system-upgrade) ==="
        # Each node restart leaves SUC upgrade pods in Unknown status — harmless ghosts, not real faults.
        # Exclude the system-upgrade namespace so genuine workload problems stand out.
        UNHEALTHY=$(kubectl get pods -A --field-selector=metadata.namespace!=system-upgrade --no-headers 2>/dev/null \
          | grep -v -E "Running|Completed|Succeeded" || true)
        if [ -n "$UNHEALTHY" ]; then echo "$UNHEALTHY"; else echo "All pods healthy."; fi
        echo ""
        echo "=== cert-manager Certificates ==="
        kubectl get certificates -A 2>/dev/null || echo "(no certificates found)"

  # ── Mirror production state ───────────────────────────────────────────────────

  mirror:all:
    desc: Install old cert-manager and SUC to match production state (intentionally old versions)
    cmds:
      - task: mirror:cert-manager
      - task: mirror:suc

  mirror:cert-manager:
    desc: "Install cert-manager v1.0.3 via Helm — intentionally old, mirrors production (Helm-managed)"
    env:
      KUBECONFIG: "{{.TASKFILE_DIR}}/kubeconfig-orbstack.yaml"
    cmds:
      - helm repo add jetstack https://charts.jetstack.io 2>/dev/null || true
      - helm repo update jetstack
      # Production runs cert-manager as a Helm release (chart cert-manager-v1.0.3).
      # v1.0.3/v1.11.x charts gate CRDs behind installCRDs (renamed to crds.enabled in v1.15).
      - >
        helm upgrade --install cert-manager jetstack/cert-manager
        --version v1.0.3 --namespace cert-manager --create-namespace
        --set installCRDs=true --wait
      - kubectl rollout status deployment/cert-manager deployment/cert-manager-cainjector deployment/cert-manager-webhook -n cert-manager --timeout=120s

  mirror:suc:
    desc: "Install system-upgrade-controller v0.6.2 — intentionally old to mirror production"
    env:
      KUBECONFIG: "{{.TASKFILE_DIR}}/kubeconfig-orbstack.yaml"
    cmds:
      - kubectl apply -f https://raw.githubusercontent.com/rancher/system-upgrade-controller/v0.6.2/manifests/system-upgrade-controller.yaml
      # The v0.6.2 tag's manifest pins the older v0.5.0 image; production runs v0.6.2, so pin it to match.
      - kubectl set image deployment/system-upgrade-controller -n system-upgrade system-upgrade-controller=rancher/system-upgrade-controller:v0.6.2
      - kubectl rollout status deployment/system-upgrade-controller -n system-upgrade --timeout=60s

  # ── Pre-upgrade component upgrades ────────────────────────────────────────────

  upgrade:suc:
    desc: Upgrade system-upgrade-controller from v0.6.2 to v0.19.2
    env:
      KUBECONFIG: "{{.TASKFILE_DIR}}/kubeconfig-orbstack.yaml"
    cmds:
      # The v0.6.2 binding points at cluster-admin; v0.19.2 rebinds it to a scoped role.
      # roleRef is immutable, so the old ClusterRoleBinding must be deleted before apply.
      - kubectl delete clusterrolebinding system-upgrade --ignore-not-found
      - kubectl apply -f https://github.com/rancher/system-upgrade-controller/releases/download/v0.19.2/system-upgrade-controller.yaml
      - kubectl rollout status deployment/system-upgrade-controller -n system-upgrade --timeout=120s
      - |
        echo "SUC version after upgrade:"
        kubectl get deployment system-upgrade-controller -n system-upgrade \
          -o jsonpath='{.spec.template.spec.containers[0].image}'
        echo

  # cert-manager is Helm-managed (matching production) and must track the
  # Kubernetes version — it cannot leap straight to latest:
  #   1. The chart enforces kubeVersion >= 1.22, so on k8s 1.21 the newest
  #      installable line is v1.11.x.
  #   2. cert-manager >= v1.18 ships CRDs using `selectableFields`, a CRD-API
  #      feature only present in k8s >= 1.30; don't install those on older k8s.
  # The CRD value flag was renamed from `installCRDs` to `crds.enabled` in chart
  # v1.15, so these tasks pick the right one based on the target minor version.
  #
  # The FIRST move off the ancient v1.0.3 release must use :reinstall — a direct
  # `helm upgrade` across that 11-minor gap fails on the CRD conversion merge
  # (cert-manager forbids skipping minor versions). :reinstall backs up the CRs,
  # uninstalls, installs the target fresh, and restores the CRs. TLS Secrets are
  # not owner-referenced by Certificates, so they survive the uninstall and TLS
  # keeps serving with no outage. Subsequent bumps between modern versions use
  # the plain `upgrade:cert-manager` (helm upgrade).
  #
  # Recommended targets per stop on the 1.21 -> 1.36 journey:
  #   on k8s 1.21 (before first hop):  task upgrade:cert-manager:reinstall -- v1.11.5
  #   on k8s 1.25 (after first hop):   task upgrade:cert-manager -- v1.17.4
  #   on k8s 1.36 (final):             task upgrade:cert-manager -- v1.18.2   (or later)

  upgrade:cert-manager:reinstall:
    desc: "Reinstall cert-manager at TARGET preserving CRs (use for the initial jump off v1.0.3). Usage: task upgrade:cert-manager:reinstall -- v1.11.5"
    vars:
      TARGET: '{{.CLI_ARGS | trim}}'
    preconditions:
      - sh: test -n "{{.TARGET}}"
        msg: "Usage: task upgrade:cert-manager:reinstall -- v1.11.5"
    env:
      KUBECONFIG: "{{.TASKFILE_DIR}}/kubeconfig-orbstack.yaml"
    cmds:
      - helm repo add jetstack https://charts.jetstack.io 2>/dev/null || true
      - helm repo update jetstack
      # 1. Back up all CRs (stripped of cluster-specific metadata + status).
      #    TLS Secrets are NOT owner-referenced, so they survive on their own.
      - |
        python3 - <<'PY'
        import subprocess, json
        raw = subprocess.check_output(["kubectl","get","issuers,clusterissuers,certificates","-A","-o","json"])
        d = json.loads(raw); out = []
        for it in d.get("items", []):
            m = it["metadata"]
            for k in ["resourceVersion","uid","creationTimestamp","generation","managedFields","ownerReferences"]:
                m.pop(k, None)
            if m.get("annotations"):
                m["annotations"].pop("kubectl.kubernetes.io/last-applied-configuration", None)
            it.pop("status", None)
            out.append(it)
        json.dump({"apiVersion":"v1","kind":"List","items":out}, open("{{.TEMP_DIR}}/cm-cr-backup.json","w"))
        print(f"Backed up {len(out)} cert-manager CRs to {{.TEMP_DIR}}/cm-cr-backup.json")
        PY
      # 2. Uninstall the old release (controller + CRDs + CRs deleted; TLS Secrets persist)
      - helm uninstall cert-manager -n cert-manager
      # 3. Install the target version fresh (recreates CRDs at the new schema)
      - |
        TARGET="{{.TARGET}}"
        MINOR=$(echo "$TARGET" | sed -E 's/^v1\.([0-9]+)\..*/\1/')
        if [ "$MINOR" -le 14 ]; then CRD_FLAG="--set installCRDs=true"; else CRD_FLAG="--set crds.enabled=true"; fi
        echo "Installing cert-manager ${TARGET} fresh (${CRD_FLAG})..."
        helm install cert-manager jetstack/cert-manager \
          --version "$TARGET" --namespace cert-manager --create-namespace \
          $CRD_FLAG --wait --timeout 180s
      # 4. Restore the CRs (retry through webhook warmup); certs go Ready against surviving Secrets
      - |
        for i in 1 2 3 4 5 6; do
          if kubectl apply -f {{.TEMP_DIR}}/cm-cr-backup.json 2>/dev/null; then echo "CRs restored."; break; fi
          echo "waiting for cert-manager webhook to warm up... ($i)"; sleep 10
        done
      - kubectl rollout status deployment/cert-manager deployment/cert-manager-cainjector deployment/cert-manager-webhook -n cert-manager --timeout=180s
      - |
        echo "cert-manager version now:"
        kubectl get deployment cert-manager -n cert-manager \
          -o jsonpath='{.spec.template.spec.containers[0].image}'
        echo

  upgrade:cert-manager:
    desc: "Upgrade the cert-manager Helm release to a target version (modern versions only). Usage: task upgrade:cert-manager -- v1.17.4"
    vars:
      TARGET: '{{.CLI_ARGS | trim}}'
    preconditions:
      - sh: test -n "{{.TARGET}}"
        msg: "Usage: task upgrade:cert-manager -- v1.17.4 (pick a version contemporaneous with the cluster's k8s)"
    env:
      KUBECONFIG: "{{.TASKFILE_DIR}}/kubeconfig-orbstack.yaml"
    cmds:
      - helm repo add jetstack https://charts.jetstack.io 2>/dev/null || true
      - helm repo update jetstack
      - |
        kubectl get certificates,certificaterequests,issuers,clusterissuers -A -o yaml \
          > {{.TEMP_DIR}}/cert-manager-backup.yaml 2>/dev/null || true
        echo "Backup written to {{.TEMP_DIR}}/cert-manager-backup.yaml"
      - |
        TARGET="{{.TARGET}}"
        MINOR=$(echo "$TARGET" | sed -E 's/^v1\.([0-9]+)\..*/\1/')
        # CRD flag renamed installCRDs -> crds.enabled at chart v1.15
        if [ "$MINOR" -le 14 ]; then CRD_FLAG="--set installCRDs=true"; else CRD_FLAG="--set crds.enabled=true"; fi
        echo "Upgrading cert-manager Helm release to ${TARGET} (${CRD_FLAG})..."
        helm upgrade --install cert-manager jetstack/cert-manager \
          --version "$TARGET" --namespace cert-manager --create-namespace \
          $CRD_FLAG --wait
      - kubectl rollout status deployment/cert-manager deployment/cert-manager-cainjector deployment/cert-manager-webhook -n cert-manager --timeout=180s
      - |
        echo "cert-manager version now:"
        kubectl get deployment cert-manager -n cert-manager \
          -o jsonpath='{.spec.template.spec.containers[0].image}'
        echo

  # ── K3s version upgrades ──────────────────────────────────────────────────────

  k3s:upgrade:
    desc: "Roll all nodes to a new K3s version via system-upgrade-controller. Usage: task k3s:upgrade -- v1.25.16+k3s4"
    vars:
      TARGET: '{{.CLI_ARGS | trim}}'
    preconditions:
      - sh: test -n "{{.TARGET}}"
        msg: "Usage: task k3s:upgrade -- v1.25.16+k3s4"
    env:
      KUBECONFIG: "{{.TASKFILE_DIR}}/kubeconfig-orbstack.yaml"
    cmds:
      - |
        export K3S_VERSION="{{.TARGET}}"
        export K3S_VERSION_TAG="${K3S_VERSION//+/-}"
        echo "Applying upgrade plans for ${K3S_VERSION} (image tag: ${K3S_VERSION_TAG})..."
        envsubst '$K3S_VERSION $K3S_VERSION_TAG' < manifests/upgrade-plans.yaml.tpl \
          | kubectl apply -f -
        echo ""
        echo "Upgrade queued. Watch progress with: task k3s:upgrade:watch"

  k3s:upgrade:watch:
    desc: Watch upgrade progress — node versions, jobs, and plan status (Ctrl-C to stop)
    env:
      KUBECONFIG: "{{.TASKFILE_DIR}}/kubeconfig-orbstack.yaml"
    cmds:
      - watch -n 10 "kubectl get plans -n system-upgrade -o wide; echo; kubectl get jobs -n system-upgrade; echo; kubectl get nodes -o wide"

  k3s:upgrade:check:
    desc: A single round of k3s:upgrade:watch
    env:
      KUBECONFIG: "{{.TASKFILE_DIR}}/kubeconfig-orbstack.yaml"
    cmds:
      - kubectl get plans -n system-upgrade -o wide; echo; kubectl get jobs -n system-upgrade; echo; kubectl get nodes -o wide
